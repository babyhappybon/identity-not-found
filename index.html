<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pixel Camera Fullscreen</title>
<style>
body { margin:0; background:black; overflow:hidden; }
canvas { display:block; width:100vw; height:100vh; }
video { display:none; }
</style>
</head>
<body>
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

navigator.mediaDevices.getUserMedia({ video: { facingMode:"user" } })
.then(stream => { video.srcObject = stream; video.play(); })
.catch(() => alert("Camera access denied"));

const blocksX = 40;
const blocksY = 30;

function draw() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const scaleX = canvas.width / blocksX;
  const scaleY = canvas.height / blocksY;
  const scale = Math.min(scaleX, scaleY);

  const drawWidth = scale * blocksX;
  const drawHeight = scale * blocksY;
  const offsetX = (canvas.width - drawWidth) / 2;
  const offsetY = (canvas.height - drawHeight) / 2;

  ctx.drawImage(video, 0, 0, blocksX, blocksY);
  const data = ctx.getImageData(0,0,blocksX,blocksY).data;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let y=0; y<blocksY; y++){
    for(let x=0; x<blocksX; x++){
      const i = (y*blocksX + x)*4;
      const r = data[i];
      const g = data[i+1];
      const b = data[i+2];
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(offsetX + x*scale, offsetY + y*scale, scale, scale);
    }
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
