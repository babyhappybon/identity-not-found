<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scan QR-style Minimal</title>
<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}
canvas {
  display: block;
}
</style>
</head>
<body>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// Камера
navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
.then(stream => { video.srcObject = stream; video.play(); })
.catch(() => alert("Camera access denied"));

// Мрачный фильтр
function applyFilter(r,g,b){
  let nr=r/255, ng=g/255, nb=b/255;
  nr=Math.pow(nr,1.3); ng=Math.pow(ng,1.3); nb=Math.pow(nb,1.3);
  const avg=(nr+ng+nb)/3;
  nr=avg+(nr-avg)*0.8; ng=avg+(ng-avg)*0.8; nb=avg+(nb-avg)*0.8;
  nr*=0.9; ng*=0.85; nb=nb*0.95+0.02;
  return [nr*255, ng*255, nb*255];
}

// QR-угол
function drawQR(x,y,size){
  const border=size*0.2, gap=size*0.15, inner=size*0.3;
  ctx.fillStyle="#000";
  ctx.fillRect(x,y,size,border);
  ctx.fillRect(x,y+size-border,size,border);
  ctx.fillRect(x,y,border,size);
  ctx.fillRect(x+size-border,y,border,size);
  ctx.fillRect(x+border+gap,y+border+gap,inner,inner);
}

// Генерация минимальных черных пикселей
let minimalBlack=[];
let qrExclusion=[];

function initMinimalBlack(cols, rows, qrSize){
  minimalBlack=[];
  qrExclusion = [
    {x:0, y:0}, 
    {x:cols-qrSize, y:0}, 
    {x:0, y:rows-qrSize}, 
    {x:cols-qrSize, y:rows-qrSize}
  ];
  
  const centerX = cols/2, centerY = rows/2;
  const radius = Math.min(cols, rows)/2.5; // зона центра чистая

  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      const dx = x-centerX, dy=y-centerY;
      const dist = Math.sqrt(dx*dx+dy*dy);
      const prob = Math.max(0,(dist-radius/2)/(radius/2))*0.08; // очень мало пикселей
      if(Math.random()<prob){
        // Проверка на QR-зоны
        let safe = true;
        for(let q of qrExclusion){
          if(x>=q.x && x<q.x+qrSize && y>=q.y && y<q.y+qrSize){ safe=false; break;}
        }
        if(safe) minimalBlack.push({x,y});
      }
    }
  }
}

function draw(){
  const pixelSize=35;
  const vw=video.videoWidth, vh=video.videoHeight;
  if(!vw||!vh){requestAnimationFrame(draw); return;}

  const cw=window.innerWidth, ch=window.innerHeight;
  canvas.width=cw; canvas.height=ch;

  const aspectVideo=vw/vh, aspectCanvas=cw/ch;
  let drawWidth, drawHeight;
  if(aspectCanvas>aspectVideo){drawHeight=ch; drawWidth=ch*aspectVideo;}
  else{drawWidth=cw; drawHeight=cw/aspectVideo;}

  const tempCanvas=document.createElement('canvas');
  tempCanvas.width=Math.ceil(drawWidth/pixelSize);
  tempCanvas.height=Math.ceil(drawHeight/pixelSize);
  const tempCtx=tempCanvas.getContext('2d');

  tempCtx.save();
  tempCtx.translate(tempCanvas.width,0);
  tempCtx.scale(-1,1);
  tempCtx.drawImage(video,0,0,tempCanvas.width,tempCanvas.height);
  tempCtx.restore();

  const imageData=tempCtx.getImageData(0,0,tempCanvas.width,tempCanvas.height);

  ctx.clearRect(0,0,cw,ch);

  const offsetX=Math.round((cw-drawWidth)/2);
  const offsetY=Math.round((ch-drawHeight)/2);

  const cols=Math.floor(drawWidth/pixelSize);
  const rows=Math.floor(drawHeight/pixelSize);
  const pxW=drawWidth/cols;
  const pxH=drawHeight/rows;

  const qrSize=Math.min(7,Math.floor(cols/8));
  if(minimalBlack.length===0) initMinimalBlack(cols, rows, qrSize);

  // Рисуем видео с фильтром
  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      const i=(y*tempCanvas.width+x)*4;
      const r=imageData.data[i], g=imageData.data[i+1], b=imageData.data[i+2];
      const [fr,fg,fb]=applyFilter(r,g,b);
      ctx.fillStyle=`rgb(${fr},${fg},${fb})`;
      ctx.fillRect(offsetX+x*pxW, offsetY+y*pxH, pxW, pxH);
    }
  }

  // Минимальные черные пиксели
  ctx.fillStyle="#000";
  minimalBlack.forEach(p=>{
    ctx.fillRect(offsetX+p.x*pxW, offsetY+p.y*pxH, pxW, pxH);
  });

  // QR-углы
  const qrDrawSize=Math.min(120,drawWidth/5);
  drawQR(offsetX, offsetY, qrDrawSize);
  drawQR(offsetX+drawWidth-qrDrawSize, offsetY, qrDrawSize);
  drawQR(offsetX, offsetY+drawHeight-qrDrawSize, qrDrawSize);
  drawQR(offsetX+drawWidth-qrDrawSize, offsetY+drawHeight-qrDrawSize, qrDrawSize);

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
