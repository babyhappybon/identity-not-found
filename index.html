<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Pixel Scan</title>
<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// Получаем доступ к камере
navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
  .then(stream => {
    video.srcObject = stream;
    video.play();
  })
  .catch(() => alert("Доступ к камере запрещён"));

// Фильтр для пикселей
function applyFilter(r, g, b) {
  let nr = r / 255;
  let ng = g / 255;
  let nb = b / 255;

  nr = Math.pow(nr, 1.3);
  ng = Math.pow(ng, 1.3);
  nb = Math.pow(nb, 1.3);

  const avg = (nr + ng + nb) / 3;
  const saturation = 0.8;

  nr = avg + (nr - avg) * saturation;
  ng = avg + (ng - avg) * saturation;
  nb = avg + (nb - avg) * saturation;

  nr = nr * 0.9;
  ng = ng * 0.85;
  nb = nb * 0.95 + 0.02;

  return [nr * 255, ng * 255, nb * 255];
}

// Рисуем QR-подобный угол
function drawQR(x, y, size) {
  const border = size * 0.2;
  const gap = size * 0.15;
  const inner = size * 0.3;

  ctx.fillStyle = "#000";

  // Рамка
  ctx.fillRect(x, y, size, border);
  ctx.fillRect(x, y + size - border, size, border);
  ctx.fillRect(x, y, border, size);
  ctx.fillRect(x + size - border, y, border, size);

  // Центр
  const innerX = x + border + gap;
  const innerY = y + border + gap;
  ctx.fillRect(innerX, innerY, inner, inner);
}

// НОВОЕ: живые QR-блоки
function drawQRNoise(offsetX, offsetY, drawWidth, drawHeight, pxW, pxH, cols, rows, time) {

  ctx.fillStyle = "#000";

  const centerStart = cols * 0.28;
  const centerEnd = cols * 0.72;

  for (let y = 0; y < rows; y++) {

    // Живое движение краёв
    const leftWave =
      Math.floor(
        4 +
        Math.sin(y * 0.35 + time * 0.002) * 3 +
        Math.sin(y * 0.12 + time * 0.0015) * 2
      );

    const rightWave =
      Math.floor(
        4 +
        Math.cos(y * 0.3 + time * 0.0025) * 3 +
        Math.sin(y * 0.15 + time * 0.001) * 2
      );

    // ЛЕВАЯ СТОРОНА
    for (let x = 0; x < leftWave; x++) {

      if ((x + y + Math.floor(time * 0.01)) % 2 === 0 || Math.random() > 0.7) {

        ctx.fillRect(
          offsetX + x * pxW,
          offsetY + y * pxH,
          pxW,
          pxH
        );
      }
    }

    // ПРАВАЯ СТОРОНА
    for (let x = cols - rightWave; x < cols; x++) {

      if (
        (x + y + Math.floor(time * 0.01)) % 2 === 0 ||
        Math.random() > 0.7
      ) {

        ctx.fillRect(
          offsetX + x * pxW,
          offsetY + y * pxH,
          pxW,
          pxH
        );
      }
    }

    // QR-помехи вокруг лица
    for (let x = 0; x < cols; x++) {

      const inCenter = x > centerStart && x < centerEnd;

      if (!inCenter) {

        const noise =
          Math.sin(x * 0.9 + y * 0.4 + time * 0.003);

        if (noise > 0.82) {

          ctx.fillRect(
            offsetX + x * pxW,
            offsetY + y * pxH,
            pxW,
            pxH
          );
        }
      }
    }
  }

  // Летающие QR-блоки
  for (let i = 0; i < 25; i++) {

    const nx =
      Math.sin(i * 77 + time * 0.0015) * drawWidth * 0.35 +
      drawWidth * 0.5;

    const ny =
      Math.cos(i * 99 + time * 0.0012) * drawHeight * 0.4 +
      drawHeight * 0.5;

    const size =
      ((Math.sin(i + time * 0.003) + 1) * 0.5 + 0.5) * pxW;

    // не залезаем в центр лица
    if (nx > drawWidth * 0.3 && nx < drawWidth * 0.7) continue;

    ctx.fillRect(
      offsetX + nx,
      offsetY + ny,
      size,
      size
    );
  }
}

// Основной рендер
function draw(time = 0) {

  const pixelSize = 35;
  const vw = video.videoWidth;
  const vh = video.videoHeight;

  if (!vw || !vh) {
    requestAnimationFrame(draw);
    return;
  }

  const cw = window.innerWidth;
  const ch = window.innerHeight;

  canvas.width = cw;
  canvas.height = ch;

  const aspectVideo = vw / vh;
  const aspectCanvas = cw / ch;

  let drawWidth, drawHeight;

  if (aspectCanvas > aspectVideo) {
    drawHeight = ch;
    drawWidth = ch * aspectVideo;
  } else {
    drawWidth = cw;
    drawHeight = cw / aspectVideo;
  }

  // Временный холст для уменьшенного изображения
  const tempCanvas = document.createElement('canvas');

  tempCanvas.width = Math.ceil(drawWidth / pixelSize);
  tempCanvas.height = Math.ceil(drawHeight / pixelSize);

  const tempCtx = tempCanvas.getContext('2d');

  // Зеркало видео
  tempCtx.save();
  tempCtx.translate(tempCanvas.width, 0);
  tempCtx.scale(-1, 1);
  tempCtx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
  tempCtx.restore();

  const imageData =
    tempCtx.getImageData(
      0,
      0,
      tempCanvas.width,
      tempCanvas.height
    );

  ctx.clearRect(0, 0, cw, ch);

  const offsetX =
    Math.round((cw - drawWidth) / 2);

  const offsetY =
    Math.round((ch - drawHeight) / 2);

  const cols =
    Math.floor(drawWidth / pixelSize);

  const rows =
    Math.floor(drawHeight / pixelSize);

  const pxW =
    drawWidth / cols;

  const pxH =
    drawHeight / rows;

  // Рисуем пиксели
  for (let y = 0; y < rows; y++) {

    for (let x = 0; x < cols; x++) {

      const i =
        (y * tempCanvas.width + x) * 4;

      const r = imageData.data[i];
      const g = imageData.data[i + 1];
      const b = imageData.data[i + 2];

      const [fr, fg, fb] =
        applyFilter(r, g, b);

      ctx.fillStyle =
        `rgb(${fr.toFixed(0)}, ${fg.toFixed(0)}, ${fb.toFixed(0)})`;

      ctx.fillRect(
        offsetX + x * pxW,
        offsetY + y * pxH,
        pxW,
        pxH
      );
    }
  }

  // НОВОЕ: живой QR-эффект
  drawQRNoise(
    offsetX,
    offsetY,
    drawWidth,
    drawHeight,
    pxW,
    pxH,
    cols,
    rows,
    time
  );

  // Рисуем QR-углы
  const qrSize =
    Math.min(120, drawWidth / 5);

  drawQR(offsetX, offsetY, qrSize);

  drawQR(
    offsetX + drawWidth - qrSize,
    offsetY,
    qrSize
  );

  drawQR(
    offsetX,
    offsetY + drawHeight - qrSize,
    qrSize
  );

  drawQR(
    offsetX + drawWidth - qrSize,
    offsetY + drawHeight - qrSize,
    qrSize
  );

  requestAnimationFrame(draw);
}

// Запуск
draw();

// Поддержка ресайза окна
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

</script>

</body>
</html>
