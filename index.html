<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scan</title>
<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}
canvas {
  display: block;
}
</style>
</head>
<body>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// Камера
navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
.then(stream => { video.srcObject = stream; video.play(); })
.catch(err => { alert("Camera access denied"); });

// Мрачный фильтр
function applyFilter(r, g, b) {
  let nr = r / 255, ng = g / 255, nb = b / 255;
  nr = Math.pow(nr, 1.3); ng = Math.pow(ng, 1.3); nb = Math.pow(nb, 1.3);
  const sat = 0.8, avg = (nr + ng + nb) / 3;
  nr = avg + (nr - avg) * sat; ng = avg + (ng - avg) * sat; nb = avg + (nb - avg) * sat;
  nr *= 0.9; ng *= 0.85; nb = nb*0.95 + 0.02;
  nr = Math.min(1, Math.max(0, nr)); ng = Math.min(1, Math.max(0, ng)); nb = Math.min(1, Math.max(0, nb));
  return [nr*255, ng*255, nb*255];
}

// Динамичный QR-угол с кольцевым промежутком
function drawDynamicQRCorner(x, y, size, scale, tempCanvas) {
  const ctxTemp = tempCanvas.getContext('2d');
  const imageData = ctxTemp.getImageData(0, 0, tempCanvas.width, tempCanvas.height);

  const outerLine = size / 5;       // толщина внешней рамки
  const innerSize = size / 2;       // размер внутреннего черного квадрата
  const gap = size - innerSize - 2*outerLine; // ширина кольца для видео

  // 1️⃣ Внешняя рамка
  ctx.fillStyle = "#000";
  ctx.fillRect(x, y, size, outerLine);
  ctx.fillRect(x, y + size - outerLine, size, outerLine);
  ctx.fillRect(x, y, outerLine, size);
  ctx.fillRect(x + size - outerLine, y, outerLine, size);

  // 2️⃣ Кольцевой промежуток (по периметру)
  const steps = Math.floor(gap / scale);
  for (let iy = 0; iy < steps; iy++) {
    for (let ix = 0; ix < steps; ix++) {
      // верхняя полоса
      let px = outerLine + ix*scale;
      let py = iy*scale;
      const iTop = (Math.floor(iy*tempCanvas.height/steps)*tempCanvas.width + Math.floor(ix*tempCanvas.width/steps))*4;
      const rTop = imageData.data[iTop], gTop = imageData.data[iTop+1], bTop = imageData.data[iTop+2];
      const [frTop, fgTop, fbTop] = applyFilter(rTop,gTop,bTop);
      ctx.fillStyle = `rgb(${frTop},${fgTop},${fbTop})`;
      ctx.fillRect(x + px, y + py, scale, scale);

      // нижняя полоса
      const pyBot = outerLine + gap - iy*scale;
      const iBot = (Math.floor((iy)*tempCanvas.height/steps)*tempCanvas.width + Math.floor(ix*tempCanvas.width/steps))*4;
      const rBot = imageData.data[iBot], gBot = imageData.data[iBot+1], bBot = imageData.data[iBot+2];
      const [frBot, fgBot, fbBot] = applyFilter(rBot,gBot, bBot);
      ctx.fillStyle = `rgb(${frBot},${fgBot},${fbBot})`;
      ctx.fillRect(x + px, y + pyBot, scale, scale);

      // левая полоса
      const lx = ix*scale;
      const ly = outerLine + iy*scale;
      const iLeft = (Math.floor(iy*tempCanvas.height/steps)*tempCanvas.width + Math.floor(ix*tempCanvas.width/steps))*4;
      const rL = imageData.data[iLeft], gL = imageData.data[iLeft+1], bL = imageData.data[iLeft+2];
      const [frL, fgL, fbL] = applyFilter(rL,gL,bL);
      ctx.fillStyle = `rgb(${frL},${fgL},${fbL})`;
      ctx.fillRect(x + lx, y + ly, scale, scale);

      // правая полоса
      const rx = outerLine + gap - ix*scale;
      const ry = outerLine + iy*scale;
      const iR = (Math.floor(iy*tempCanvas.height/steps)*tempCanvas.width + Math.floor(ix*tempCanvas.width/steps))*4;
      const rR = imageData.data[iR], gR = imageData.data[iR+1], bR = imageData.data[iR+2];
      const [frR, fgR, fbR] = applyFilter(rR,gR,bR);
      ctx.fillStyle = `rgb(${frR},${fgR},${fbR})`;
      ctx.fillRect(x + rx, y + ry, scale, scale);
    }
  }

  // 3️⃣ Внутренний черный квадрат
  const innerX = x + outerLine + gap;
  const innerY = y + outerLine + gap;
  ctx.fillStyle = "#000";
  ctx.fillRect(innerX, innerY, innerSize, innerSize);
}

// Основная функция
function draw() {
  const scale = 35;
  const vw = video.videoWidth, vh = video.videoHeight;
  if (vw===0 || vh===0) { requestAnimationFrame(draw); return; }

  const cw = window.innerWidth, ch = window.innerHeight;
  canvas.width = cw; canvas.height = ch;

  const aspectVideo = vw/vh;
  const aspectCanvas = cw/ch;
  let drawWidth, drawHeight;
  if (aspectCanvas > aspectVideo) { drawHeight = ch; drawWidth = ch*aspectVideo; }
  else { drawWidth = cw; drawHeight = cw/aspectVideo; }

  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = drawWidth / scale;
  tempCanvas.height = drawHeight / scale;
  const tempCtx = tempCanvas.getContext('2d');

  tempCtx.save();
  tempCtx.translate(tempCanvas.width,0);
  tempCtx.scale(-1,1);
  tempCtx.drawImage(video,0,0,tempCanvas.width,tempCanvas.height);
  tempCtx.restore();

  const offsetX = (cw - drawWidth)/2;
  const offsetY = (ch - drawHeight)/2;

  const imageData = tempCtx.getImageData(0,0,tempCanvas.width,tempCanvas.height);
  for (let y=0;y<tempCanvas.height;y++){
    for(let x=0;x<tempCanvas.width;x++){
      const i=(y*tempCanvas.width+x)*4;
      const r=imageData.data[i], g=imageData.data[i+1], b=imageData.data[i+2];
      const [fr,fg,fb]=applyFilter(r,g,b);
      ctx.fillStyle=`rgb(${fr},${fg},${fb})`;
      ctx.fillRect(offsetX+x*scale, offsetY+y*scale, scale, scale);
    }
  }

  const qrSize = 140;
  drawDynamicQRCorner(offsetX, offsetY, qrSize, scale, tempCanvas); // лев верх
  drawDynamicQRCorner(offsetX+drawWidth-qrSize, offsetY, qrSize, scale, tempCanvas); // прав верх
  drawDynamicQRCorner(offsetX, offsetY+drawHeight-qrSize, qrSize, scale, tempCanvas); // лев низ
  drawDynamicQRCorner(offsetX+drawWidth-qrSize, offsetY+drawHeight-qrSize, qrSize, scale, tempCanvas); // прав низ

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
