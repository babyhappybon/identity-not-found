<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scan</title>
<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}
canvas {
  display: block;
}
</style>
</head>
<body>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// Получаем камеру
navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
.then(stream => {
  video.srcObject = stream;
  video.play();
})
.catch(err => {
  alert("Camera access denied");
});

// Мрачный художественный фильтр
function applyFilter(r, g, b) {
  let nr = r / 255;
  let ng = g / 255;
  let nb = b / 255;
  
  // затемняем средние и светлые тона
  nr = Math.pow(nr, 1.3);
  ng = Math.pow(ng, 1.3);
  nb = Math.pow(nb, 1.3);
  
  // приглушаем насыщенность
  const saturation = 0.8;
  const avg = (nr + ng + nb) / 3;
  nr = avg + (nr - avg) * saturation;
  ng = avg + (ng - avg) * saturation;
  nb = avg + (nb - avg) * saturation;
  
  // мрачная тонировка
  nr = nr * 0.9;
  ng = ng * 0.85;
  nb = nb * 0.95 + 0.02;
  
  // ограничиваем диапазон
  nr = Math.min(1, Math.max(0, nr));
  ng = Math.min(1, Math.max(0, ng));
  nb = Math.min(1, Math.max(0, nb));
  
  return [nr * 255, ng * 255, nb * 255];
}

// QR-угол
function drawQR(x, y, size) {
  const borderWidth = size / 5;
  
  ctx.fillStyle = "#000";
  
  // Внешние полосы
  ctx.fillRect(x, y, size, borderWidth);
  ctx.fillRect(x, y + size - borderWidth, size, borderWidth);
  ctx.fillRect(x, y, borderWidth, size);
  ctx.fillRect(x + size - borderWidth, y, borderWidth, size);
  
  // Внутренний квадрат
  const innerSize = size / 3;
  const innerX = x + (size - innerSize) / 2;
  const innerY = y + (size - innerSize) / 2;
  ctx.fillRect(innerX, innerY, innerSize, innerSize);
}

// Основная функция рисования
function draw() {
  const pixelSize = 35; // размер пикселя
  const vw = video.videoWidth;
  const vh = video.videoHeight;

  if (vw === 0 || vh === 0) {
    requestAnimationFrame(draw);
    return;
  }

  // Рассчитываем размер канваса под окно
  const cw = window.innerWidth;
  const ch = window.innerHeight;

  canvas.width = cw;
  canvas.height = ch;

  // Сохраняем пропорции видео
  const aspectVideo = vw / vh;
  const aspectCanvas = cw / ch;

  let drawWidth, drawHeight;
  if (aspectCanvas > aspectVideo) {
    drawHeight = ch;
    drawWidth = ch * aspectVideo;
  } else {
    drawWidth = cw;
    drawHeight = cw / aspectVideo;
  }

  // Рисуем видео на скрытом канвасе с нужными размерами
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = Math.ceil(drawWidth / pixelSize);
  tempCanvas.height = Math.ceil(drawHeight / pixelSize);
  const tempCtx = tempCanvas.getContext('2d');

  // Зеркалим изображение горизонтально
  tempCtx.save();
  tempCtx.translate(tempCanvas.width, 0);
  tempCtx.scale(-1, 1);
  tempCtx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
  tempCtx.restore();

  const imageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);

  ctx.clearRect(0, 0, cw, ch);

  // Центрируем изображение на канвасе
  const offsetX = (cw - drawWidth) / 2;
  const offsetY = (ch - drawHeight) / 2;

  // Рисуем "пиксели" с применением фильтра
  for (let y = 0; y < tempCanvas.height; y++) {
    for (let x = 0; x < tempCanvas.width; x++) {
      const i = (y * tempCanvas.width + x) * 4;
      const r = imageData.data[i];
      const g = imageData.data[i + 1];
      const b = imageData.data[i + 2];
      
      // Применяем мрачный фильтр
      const [filteredR, filteredG, filteredB] = applyFilter(r, g, b);

      ctx.fillStyle = `rgb(${filteredR}, ${filteredG}, ${filteredB})`;
      ctx.fillRect(offsetX + x * pixelSize, offsetY + y * pixelSize, pixelSize, pixelSize);
    }
  }
  
  // Рисуем QR-квадраты по УГЛАМ ВИДЕО (не экрана)
  const qrSize = Math.min(100, drawWidth / 4, drawHeight / 4); // размер квадрата относительно видео
  const margin = 10; // отступ от краёв видео
  
  // Верхний-левый угол видео
  drawQR(offsetX + margin, offsetY + margin, qrSize);
  // Верхний-правый угол видео
  drawQR(offsetX + drawWidth - qrSize - margin, offsetY + margin, qrSize);
  // Нижний-левый угол видео
  drawQR(offsetX + margin, offsetY + drawHeight - qrSize - margin, qrSize);
  // Нижний-правый угол видео
  drawQR(offsetX + drawWidth - qrSize - margin, offsetY + drawHeight - qrSize - margin, qrSize);

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
