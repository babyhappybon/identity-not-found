<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scan</title>
<style>
body { margin:0; background:black; overflow:hidden; }
canvas { display:block; }
video { display:none; }
</style>
</head>
<body>
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

navigator.mediaDevices.getUserMedia({ video: { facingMode:"user" } })
.then(stream => { video.srcObject = stream; video.play(); })
.catch(() => alert("Camera access denied"));

function draw() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const pixelsX = 40;
  const pixelsY = 30;

  const scale = Math.min(canvas.width / pixelsX, canvas.height / pixelsY);
  const offsetX = (canvas.width - pixelsX*scale)/2;
  const offsetY = (canvas.height - pixelsY*scale)/2;

  ctx.drawImage(video, 0, 0, pixelsX, pixelsY);
  const data = ctx.getImageData(0,0,pixelsX,pixelsY).data;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let y=0; y<pixelsY; y++){
    for(let x=0; x<pixelsX; x++){
      const i = (y*pixelsX+x)*4;
      const r = data[i], g = data[i+1], b = data[i+2];
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(offsetX + x*scale, offsetY + y*scale, scale, scale);
    }
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
