<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scan</title>
<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}
canvas {
  display: block;
}
</style>
</head>
<body>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// Камера
navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
.then(stream => {
  video.srcObject = stream;
  video.play();
})
.catch(() => alert("Camera access denied"));

// Фильтр
function applyFilter(r, g, b) {
  let nr = r / 255;
  let ng = g / 255;
  let nb = b / 255;

  nr = Math.pow(nr, 1.3);
  ng = Math.pow(ng, 1.3);
  nb = Math.pow(nb, 1.3);

  const avg = (nr + ng + nb) / 3;
  const saturation = 0.8;

  nr = avg + (nr - avg) * saturation;
  ng = avg + (ng - avg) * saturation;
  nb = avg + (nb - avg) * saturation;

  nr = nr * 0.9;
  ng = ng * 0.85;
  nb = nb * 0.95 + 0.02;

  return [nr * 255, ng * 255, nb * 255];
}

// QR-угол (рамка → зазор → центр)
function drawQR(x, y, size) {
  const border = size * 0.2;
  const gap = size * 0.15;
  const inner = size * 0.3;

  ctx.fillStyle = "#000";

  // Рамка
  ctx.fillRect(x, y, size, border);
  ctx.fillRect(x, y + size - border, size, border);
  ctx.fillRect(x, y, border, size);
  ctx.fillRect(x + size - border, y, border, size);

  // Центр
  const innerX = x + border + gap;
  const innerY = y + border + gap;

  ctx.fillRect(innerX, innerY, inner, inner);
}

// Рендер
function draw() {
  const pixelSize = 35;
  const vw = video.videoWidth;
  const vh = video.videoHeight;

  if (!vw || !vh) {
    requestAnimationFrame(draw);
    return;
  }

  const cw = window.innerWidth;
  const ch = window.innerHeight;

  canvas.width = cw;
  canvas.height = ch;

  const aspectVideo = vw / vh;
  const aspectCanvas = cw / ch;

  let drawWidth, drawHeight;

  if (aspectCanvas > aspectVideo) {
    drawHeight = ch;
    drawWidth = ch * aspectVideo;
  } else {
    drawWidth = cw;
    drawHeight = cw / aspectVideo;
  }

  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = Math.ceil(drawWidth / pixelSize);
  tempCanvas.height = Math.ceil(drawHeight / pixelSize);
  const tempCtx = tempCanvas.getContext('2d');

  // Зеркало
  tempCtx.save();
  tempCtx.translate(tempCanvas.width, 0);
  tempCtx.scale(-1, 1);
  tempCtx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
  tempCtx.restore();

  const imageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);

  ctx.clearRect(0, 0, cw, ch);

  // Центрирование
  const offsetX = Math.round((cw - drawWidth) / 2);
  const offsetY = Math.round((ch - drawHeight) / 2);

  // Точное количество колонок и рядов для нижнего ряда
  const cols = Math.floor(drawWidth / pixelSize);
  const rows = Math.floor(drawHeight / pixelSize);
  const pxW = drawWidth / cols;
  const pxH = drawHeight / rows;

  // Пиксельный рендер
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const i = (y * tempCanvas.width + x) * 4;

      const r = imageData.data[i];
      const g = imageData.data[i + 1];
      const b = imageData.data[i + 2];

      const [fr, fg, fb] = applyFilter(r, g, b);

      ctx.fillStyle = rgb(${fr}, ${fg}, ${fb});
      ctx.fillRect(
        offsetX + x * pxW,
        offsetY + y * pxH,
        pxW,
        pxH
      );
    }
  }

  // QR углы строго по видео
  const qrSize = Math.min(120, drawWidth / 5);

  drawQR(offsetX, offsetY, qrSize); // верхний левый
  drawQR(offsetX + drawWidth - qrSize, offsetY, qrSize); // верхний правый
  drawQR(offsetX, offsetY + drawHeight - qrSize, qrSize); // нижний левый
  drawQR(offsetX + drawWidth - qrSize, offsetY + drawHeight - qrSize, qrSize); // нижний правый

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
