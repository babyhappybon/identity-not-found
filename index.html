<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scan</title>
<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}
canvas {
  display: block;
}
</style>
</head>
<body>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// Камера
navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
.then(stream => {
  video.srcObject = stream;
  video.play();
})
.catch(err => {
  alert("Camera access denied");
});

// QR-угол с правильным квадратным "кольцом"
function drawQR(x, y, size, scale, tempCanvas) {
  const tempCtx = tempCanvas.getContext('2d');
  const imageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);

  const outerLine = size / 5;
  const innerSize = size / 3;

  const innerX = x + (size - innerSize) / 2;
  const innerY = y + (size - innerSize) / 2;

  // 1. рисуем видео внутри квадрата
  for (let py = 0; py < size; py += scale) {
    for (let px = 0; px < size; px += scale) {
      const tx = Math.floor(px / size * tempCanvas.width);
      const ty = Math.floor(py / size * tempCanvas.height);
      const i = (ty * tempCanvas.width + tx) * 4;

      const r = imageData.data[i];
      const g = imageData.data[i + 1];
      const b = imageData.data[i + 2];

      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(x + px, y + py, scale, scale);
    }
  }

  // 2. вырезаем центр
  ctx.globalCompositeOperation = "destination-out";
  ctx.fillRect(innerX, innerY, innerSize, innerSize);
  ctx.globalCompositeOperation = "source-over";

  // 3. внутренний черный квадрат
  ctx.fillStyle = "#000";
  ctx.fillRect(innerX, innerY, innerSize, innerSize);

  // 4. внешняя рамка
  ctx.fillRect(x, y, size, outerLine);
  ctx.fillRect(x, y + size - outerLine, size, outerLine);
  ctx.fillRect(x, y, outerLine, size);
  ctx.fillRect(x + size - outerLine, y, outerLine, size);
}

// Основная функция
function draw() {
  const scale = 40;
  const vw = video.videoWidth;
  const vh = video.videoHeight;

  if (vw === 0 || vh === 0) {
    requestAnimationFrame(draw);
    return;
  }

  const cw = window.innerWidth;
  const ch = window.innerHeight;

  canvas.width = cw;
  canvas.height = ch;

  const aspectVideo = vw / vh;
  const aspectCanvas = cw / ch;

  let drawWidth, drawHeight;
  if (aspectCanvas > aspectVideo) {
    drawHeight = ch;
    drawWidth = ch * aspectVideo;
  } else {
    drawWidth = cw;
    drawHeight = cw / aspectVideo;
  }

  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = drawWidth / scale;
  tempCanvas.height = drawHeight / scale;
  const tempCtx = tempCanvas.getContext('2d');

  tempCtx.save();
  tempCtx.translate(tempCanvas.width, 0);
  tempCtx.scale(-1, 1);
  tempCtx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
  tempCtx.restore();

  const imageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);

  ctx.clearRect(0, 0, cw, ch);

  const offsetX = (cw - drawWidth) / 2;
  const offsetY = (ch - drawHeight) / 2;

function draw() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let scale = 20; // размер пикселей (чем больше — тем грубее)

  let w = canvas.width / scale;
  let h = canvas.height / scale;

  ctx.drawImage(video, 0, 0, w, h);
  let imageData = ctx.getImageData(0, 0, w, h);

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let i = (y * w + x) * 4;
      let r = imageData.data[i];
      let g = imageData.data[i + 1];
      let b = imageData.data[i + 2];

      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(x * scale, y * scale, scale, scale);
    }
  }

  // QR-углы
  const size = 160;

  drawQR(offsetX, offsetY, size, scale, tempCanvas);
  drawQR(offsetX + drawWidth - size, offsetY, size, scale, tempCanvas);
  drawQR(offsetX, offsetY + drawHeight - size, size, scale, tempCanvas);
  drawQR(offsetX + drawWidth - size, offsetY + drawHeight - size, size, scale, tempCanvas);

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
